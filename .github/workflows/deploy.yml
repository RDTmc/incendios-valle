name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'ec2/api/**'
      - 'ec2/docker-compose.yml'
      - 'ec2/refresh_api.sh'
      - 'ec2/grafana-provisioning/**'
      - '.github/workflows/deploy.yml'

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/incendios-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ec2/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Paso B: SCP — sincroniza archivos repo → EC2 ────────────
      # Elimina desfase local vs produccion: refresh_api.sh,
      # docker-compose.yml y provisioning se copian antes del SSH
      - name: SCP sync config to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "ec2/refresh_api.sh,ec2/docker-compose.yml"
          target: "/home/ec2-user"
          strip_components: 1

      - name: SCP sync grafana provisioning to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "ec2/grafana-provisioning/"
          target: "/home/ec2-user/grafana-provisioning"

      # ─── Paso C: SSH + refresh_api.sh ──────────────────────────────
      # Nota: SG con SSH:22 abierto permanentemente (0.0.0.0/0) por
      # decisión táctica. AWS Academy (voc-cancel-cred) bloquea
      # ec2:AuthorizeSecurityGroupIngress, así que se eliminó ese paso.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,AWS_DEFAULT_REGION
          script: |
            cd /home/ec2-user
            chmod +x ./refresh_api.sh
            ./refresh_api.sh

            echo ""
            echo "--- Limpieza de archivos huerfanos ---"
            rm -rf /home/ec2-user/grafana-provisioning/ec2
            rm -f /home/ec2-user/main.py /home/ec2-user/main_fixed*.py /home/ec2-user/main_backup.py
            rm -f /home/ec2-user/lambda_service.py /home/ec2-user/seed*.py
            rm -f /home/ec2-user/create_dashboard.py /home/ec2-user/add_geomap.py
            rm -f /home/ec2-user/patch_*.py /home/ec2-user/check_*.py
            rm -f /home/ec2-user/count_reports.py /home/ec2-user/fix_*.py
            rm -f /home/ec2-user/purge_datasource.py /home/ec2-user/upload_service.py
            rm -f /home/ec2-user/s3_service.py /home/ec2-user/dashboards.yaml
            rm -f /home/ec2-user/incendios-api.tar
            rm -f /home/ec2-user/incendios-data/grafana/incendios.db
            rm -f /home/ec2-user/data/incendios.db
            rm -f /home/ec2-user/esquema_db.txt

            echo ""
            echo "--- Eliminando plugin JSON incompatible (v1.3.28 requiere Grafana >=12) ---"
            rm -rf /home/ec2-user/incendios-data/grafana/plugins/marcusolsson-json-datasource

            echo ""
            echo "--- Fijando permisos SQLite para que Grafana (uid 472) pueda leer ---"
            chmod 644 /home/ec2-user/incendios-data/api/incendios.db 2>/dev/null || true
            chmod 755 /home/ec2-user/incendios-data/api 2>/dev/null || true

            echo ""
            echo "--- Reiniciando Grafana para nuevo datasource y plugins ---"
            docker restart incendios-grafana

            echo ""
            echo "--- Deploy completado ---"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
