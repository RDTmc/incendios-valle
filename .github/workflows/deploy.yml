name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'ec2/api/**'
      - 'ec2/docker-compose.yml'
      - 'ec2/refresh_api.sh'
      - 'ec2/grafana-provisioning/**'
      - 'frontend/**'
      - 'lambda/**'
      - 'scripts/**'
      - 'sonar-project.properties'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      restore-db:
        description: 'Restaurar SQLite desde S3'
        type: boolean
        default: true
        required: false

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/incendios-api

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── BACKEND TESTS ────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend test dependencies
        run: |
          pip install --no-cache-dir -r ec2/api/requirements-dev.txt
          pip install pytest-cov

      - name: Run backend tests with coverage
        run: |
          PYTHONPATH=ec2/api python -m pytest ec2/api/tests/ --cov=ec2/api --cov-report=xml:ec2/api/coverage.xml --cov-report=term -v --cov-config=.coveragerc
        env:
          JWT_SECRET: test-secret
          SYNC_TOKEN: test-token
          DB_PATH: /tmp/incendios.db

      # ─── FRONTEND TESTS ──────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests with coverage
        run: cd frontend && npm test -- --coverage --reporter=verbose

      # ─── SONARCLOUD ANALYSIS (main branch after project cleanup) ─
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ─── DOCKER BUILD & DEPLOY ──────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ec2/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Paso B: SCP — sincroniza archivos repo → EC2 ────────────
      # Elimina desfase local vs produccion: refresh_api.sh,
      # docker-compose.yml y provisioning se copian antes del SSH
      - name: SCP sync config to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "ec2/refresh_api.sh,ec2/docker-compose.yml,ec2/export_dashboards.sh,ec2/prometheus/,ec2/nginx/nginx.conf"
          target: "/home/ec2-user"
          strip_components: 1

      - name: SCP sync grafana provisioning to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "ec2/grafana-provisioning/"
          target: "/home/ec2-user/grafana-provisioning"
          strip_components: 2

      # ─── Paso C: SSH + refresh_api.sh ──────────────────────────────
      # Nota: SG con SSH:22 abierto permanentemente (0.0.0.0/0) por
      # decisión táctica. AWS Academy (voc-cancel-cred) bloquea
      # ec2:AuthorizeSecurityGroupIngress, así que se eliminó ese paso.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          FIRMS_API_KEY: ${{ secrets.FIRMS_API_KEY }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          envs: FIRMS_API_KEY,OWM_API_KEY
          script: |
            cd /home/ec2-user

            echo "--- Sanitizando .env (eliminar lineas corruptas sin KEY=VALUE) ---"
            sed -ni '/^[A-Za-z_][A-Za-z0-9_]*=/p' /home/ec2-user/.env 2>/dev/null || true

            echo "--- Inyectando API keys desde GitHub Secrets ---"
            if [ -n "$FIRMS_API_KEY" ]; then
              grep -q "^FIRMS_API_KEY=" /home/ec2-user/.env 2>/dev/null \
                && sed -i "s|^FIRMS_API_KEY=.*|FIRMS_API_KEY=$FIRMS_API_KEY|" /home/ec2-user/.env \
                || echo "FIRMS_API_KEY=$FIRMS_API_KEY" >> /home/ec2-user/.env
            fi
            if [ -n "$OWM_API_KEY" ]; then
              grep -q "^OWM_API_KEY=" /home/ec2-user/.env 2>/dev/null \
                && sed -i "s|^OWM_API_KEY=.*|OWM_API_KEY=$OWM_API_KEY|" /home/ec2-user/.env \
                || echo "OWM_API_KEY=$OWM_API_KEY" >> /home/ec2-user/.env
            fi

            chmod +x ./refresh_api.sh
            chmod +x ./export_dashboards.sh || true
            ./refresh_api.sh

            echo ""
            echo "--- Restore SQLite desde S3 (workflow_dispatch o post-reset) ---"
            aws s3 cp s3://$(grep AWS_S3_BUCKET /home/ec2-user/.env 2>/dev/null | cut -d= -f2)/backups/incendios-latest.db \
              /home/ec2-user/incendios-data/api/incendios.db 2>/dev/null || echo "No hay backup en S3, se creara BD limpia"

            echo ""
            echo "--- Limpieza de archivos huerfanos ---"
            rm -rf /home/ec2-user/grafana-provisioning/ec2
            rm -rf /home/ec2-user/grafana-provisioning/grafana-provisioning
            rm -f /home/ec2-user/main.py /home/ec2-user/main_fixed*.py /home/ec2-user/main_backup.py
            rm -f /home/ec2-user/lambda_service.py /home/ec2-user/seed*.py
            rm -f /home/ec2-user/create_dashboard.py /home/ec2-user/add_geomap.py
            rm -f /home/ec2-user/patch_*.py /home/ec2-user/check_*.py
            rm -f /home/ec2-user/count_reports.py /home/ec2-user/fix_*.py
            rm -f /home/ec2-user/purge_datasource.py /home/ec2-user/upload_service.py
            rm -f /home/ec2-user/s3_service.py /home/ec2-user/dashboards.yaml
            rm -f /home/ec2-user/incendios-api.tar
            rm -f /home/ec2-user/incendios-data/grafana/incendios.db
            rm -f /home/ec2-user/data/incendios.db
            rm -f /home/ec2-user/esquema_db.txt

            echo ""
            echo "--- Eliminando plugin JSON antiguo (marcusolsson-json-datasource incompatible) ---"
            rm -rf /home/ec2-user/incendios-data/grafana/plugins/marcusolsson-json-datasource

            echo ""
            echo "--- Eliminando plugin Infinity anterior (evitar conflicto de versiones stale) ---"
            rm -rf /home/ec2-user/incendios-data/grafana/plugins/yesoreyeram-infinity-datasource

            echo ""
            echo "--- Fijando permisos SQLite para que Grafana (uid 472) pueda leer/escribir ---"
            chmod 644 /home/ec2-user/incendios-data/api/incendios.db 2>/dev/null || true
            chmod 755 /home/ec2-user/incendios-data/api 2>/dev/null || true
            sudo chown 472:472 /home/ec2-user/incendios-data/grafana/grafana.db 2>/dev/null || true
            chmod 664 /home/ec2-user/incendios-data/grafana/grafana.db 2>/dev/null || true

            echo ""
            echo "--- Backup Grafana DB a S3 (pre-deploy) ---"
            S3_BUCKET_VAL=$(grep AWS_S3_BUCKET /home/ec2-user/.env 2>/dev/null | cut -d= -f2)
            S3_BUCKET_VAL=${S3_BUCKET_VAL:-incendios-valle-sol}
            aws s3 cp /home/ec2-user/incendios-data/grafana/grafana.db \
              s3://$S3_BUCKET_VAL/backups/grafana-pre-deploy.db 2>/dev/null || echo "Backup skipped"

            echo ""
            echo "--- Verificando si cambio provisioning de Grafana ---"
            PROVISIONING_DIR="/home/ec2-user/grafana-provisioning"
            CURRENT_HASH=$(find "$PROVISIONING_DIR" -type f \( -name "*.json" -o -name "*.yml" \) -exec sha256sum {} \; 2>/dev/null | sha256sum | cut -d' ' -f1)
            STORED_HASH_FILE="/home/ec2-user/.grafana_provisioning_hash"
            STORED_HASH=""
            [ -f "$STORED_HASH_FILE" ] && STORED_HASH=$(cat "$STORED_HASH_FILE")

            if [ "$CURRENT_HASH" != "$STORED_HASH" ] && [ -n "$CURRENT_HASH" ]; then
                echo "Provisioning cambiado. Actualizando Grafana..."
                echo "$CURRENT_HASH" > "$STORED_HASH_FILE"
                docker-compose pull grafana
                docker-compose up -d --no-deps --force-recreate grafana
            else
                echo "Provisioning sin cambios. Se omite reinicio de Grafana."
            fi

            echo ""
            echo "--- Deploy completado ---"
