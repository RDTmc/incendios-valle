apiVersion: 1

providers:
  - name: "Incendios Dashboard Provider"
    orgId: 1
    folder: "Incendios Valle del Sol"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
