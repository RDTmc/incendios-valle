events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 5M;

    upstream api {
        server incendios-api:8000; # Usar el container_name explícito
    }

    upstream grafana {
        server incendios-grafana:3000; # Usar el container_name explícito
    }

    server {
        listen 80;
        server_name _;

        # API - FastAPI
        location /api/ {
            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Redirección estricta de /dashboard a /dashboard/ para evitar fallos de assets
        location = /dashboard {
            return 301 $scheme://$http_host/dashboard/;
        }

        # Grafana Dashboard
        location /dashboard/ {
            proxy_pass http://grafana;  # SIN barra diagonal al final para mantener la URI intacta
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Encabezados vitales para que Grafana no rompa el sub-path
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # Nginx Health Check
        location /nginx-health {
            access_log off;
            return 200 "nginx healthy\n";
            add_header Content-Type text/plain;
        }

        # Redireccionar raíz a dashboard
        location = / {
            return 301 /dashboard/;
        }
    }
}