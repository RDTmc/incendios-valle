version: '3.8'

services:
  api:
    image: incendios-api:latest
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=us-east-1
      - DYNAMODB_TABLE_USERS=users
      - DYNAMODB_TABLE_REPORTS=reports
      - JWT_SECRET=incendios-valle-secret-key
    volumes:
      - ~/incendios-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - ~/incendios-data:/var/lib/grafana
      - ~/incendios-data/grafana-provisioning:/etc/grafana/provisioning