version: '3.8'

services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=us-east-1
      - DYNAMODB_TABLE_USERS=users
      - DYNAMODB_TABLE_REPORTS=reports
      - JWT_SECRET=incendios-valle-secret-key
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_DATABASE_TYPE=sqlite3
      - GF_DATABASE_PATH=/var/lib/grafana/reports.db
    volumes:
      - ./data:/var/lib/grafana
      - ./grafana-data:/etc/grafana/provisioning
    command: >
      bash -c "cp /etc/grafana/grafana.ini /etc/grafana/grafana.ini.bak && 
      sed -i 's/;http_port = 3000/http_port = 3000/' /etc/grafana/grafana.ini &&
      grafana-server --config=/etc/grafana/grafana.ini"