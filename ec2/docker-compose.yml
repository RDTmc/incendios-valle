version: '3.8'

services:
  api:
    image: incendios-api:latest
    container_name: incendios-api
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=us-east-1
      - DYNAMODB_TABLE_USERS=users
      - DYNAMODB_TABLE_REPORTS=reports
      - JWT_SECRET=incendios-valle-secret-key
      - SYNC_TOKEN=incendios-sync-secret-token
    volumes:
      - ~/incendios-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:latest
    container_name: incendios-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SERVER_ROOT_URL=http://${ELASTIC_IP:-localhost}:3000
    volumes:
      - ~/incendios-data:/var/lib/grafana:ro
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped