services:
  nginx:
    image: nginx:alpine
    container_name: incendios-nginx
    ports:
      - "80:80"
    volumes:
      - /home/ec2-user/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy  # Espera a que la API responda de verdad
    restart: unless-stopped

  api:
    # REEMPLAZAR 'RDTmc' con tu usuario real de Docker Hub
    image: RDTmc/incendios-api:latest
    container_name: incendios-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - DYNAMODB_TABLE_USERS=users
      - DYNAMODB_TABLE_REPORTS=reports
      - JWT_SECRET=${JWT_SECRET}
      - SYNC_TOKEN=${SYNC_TOKEN}
    volumes:
      - /home/ec2-user/incendios-data/api:/app/data  # Carpeta aislada para la API
    restart: unless-stopped
    healthcheck:
      # Usamos python interno para verificar la salud de forma nativa sin depender de curl/wget
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:10.4.2  # Fijamos versión para evitar roturas de la comunidad 'latest'
    container_name: incendios-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_DOMAIN: "3.227.186.158"
      GF_SERVER_ROOT_URL: "http://3.227.186.158/dashboard/"  # Barra final obligatoria
      GF_INSTALL_PLUGINS: "frser-sqlite-datasource"  # Auto-instalar plugin SQLite
    volumes:
      - /home/ec2-user/incendios-data/grafana:/var/lib/grafana  # Carpeta aislada para Grafana
      - /home/ec2-user/grafana-provisioning:/etc/grafana/provisioning
    restart: unless-stopped

networks:
  default:
    driver: bridge