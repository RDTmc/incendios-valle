version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: incendios-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - grafana
    restart: unless-stopped

  api:
    image: incendios-api:latest
    container_name: incendios-api
    environment:
      - AWS_REGION=us-east-1
      - DYNAMODB_TABLE_USERS=users
      - DYNAMODB_TABLE_REPORTS=reports
      - JWT_SECRET=incendios-valle-secret-key
      - SYNC_TOKEN=incendios-sync-secret-token
    volumes:
      - /home/ec2-user/incendios-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:latest
    container_name: incendios-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SERVER_ROOT_URL=http://3.227.186.158/dashboard/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - /home/ec2-user/incendios-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    restart: unless-stopped

networks:
  default:
    driver: bridge