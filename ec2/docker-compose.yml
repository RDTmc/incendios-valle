services:
  nginx:
    image: nginx:alpine
    container_name: incendios-nginx
    ports:
      - "80:80"
    volumes:
      - /home/ec2-user/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy  # Espera a que la API responda de verdad
    restart: unless-stopped

  api:
    image: rdtmc/incendios-api:latest
    container_name: incendios-api
    user: "472:472"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_REGION=us-east-1
      # Credenciales AWS via LabRole (IMDS) - no se setean env vars
      - DYNAMODB_TABLE_USERS=users
      - DYNAMODB_TABLE_REPORTS=reports
      - JWT_SECRET=${JWT_SECRET}
      - SYNC_TOKEN=${SYNC_TOKEN}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - FIRMS_API_KEY=${FIRMS_API_KEY}
      - OWM_API_KEY=${OWM_API_KEY}
      - LAMBDA_FUNCTION_NAME=upload-proxy
      - GRAFANA_TOKEN=${GRAFANA_TOKEN}
      - MAILTRAP_TOKEN=${MAILTRAP_TOKEN}
      - MAILTRAP_SENDER=${MAILTRAP_SENDER:-hello@demomailtrap.co}
      - MAILTRAP_SENDER_NAME=${MAILTRAP_SENDER_NAME:-Incendios Valle del Sol}
    volumes:
      - /home/ec2-user/incendios-data/api:/app/data  # Carpeta aislada para la API
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:10.4.8  # Fijamos versión 10.4.8+ (requerido por Infinity datasource plugin)
    container_name: incendios-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_DOMAIN: "dashboard.keogh.lat"
      GF_SERVER_ROOT_URL: "https://dashboard.keogh.lat/dashboard/"
      GF_INSTALL_PLUGINS: "frser-sqlite-datasource"  # SQLite + Infinity JSON API
    volumes:
      - /home/ec2-user/incendios-data/grafana:/var/lib/grafana  # Carpeta aislada para Grafana
      - /home/ec2-user/incendios-data/api:/data:rw  # BD que escribe la API, Grafana lee
      - /home/ec2-user/grafana-provisioning:/etc/grafana/provisioning
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: incendios-prometheus
    user: "472:472"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /home/ec2-user/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /home/ec2-user/incendios-data/prometheus:/prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: incendios-node-exporter
    network_mode: "host"
    restart: unless-stopped

networks:
  default:
    driver: bridge