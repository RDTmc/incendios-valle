apiVersion: 1

datasources:
  - name: SQLite Incendios
    uid: incendios-sqlite
    type: frser-sqlite-datasource
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      path: /data/incendios.db
      pathPrefix: "file:"
      pathOptions: "_pragma=journal_mode=WAL&_pragma=busy_timeout=5000"