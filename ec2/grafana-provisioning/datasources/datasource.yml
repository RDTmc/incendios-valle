apiVersion: 1

datasources:
  - name: Incendios Infinity
    uid: inc-infinity
    type: yesoreyeram-infinity-datasource
    access: proxy
    url: http://incendios-api:8000
    isDefault: true
    editable: true
    jsonData:
      auth_method: none
      allowedHosts:
        - http://incendios-api:8000

  - name: SQLite Incendios
    uid: incendios-sqlite
    type: frser-sqlite-datasource
    access: proxy
    database: /data/incendios.db
    isDefault: false
    editable: true